<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GRANDE AUTO HUT LTD</title>
    <script src="https://kit.fontawesome.com/576b15dc95.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="CSS/login.css">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="brand">
                <h1>Grande Auto Hut Ltd</h1>
                <p>Where our service to you is our top priority</p>
            </div>

            <div class="auth-card">
                <h2>Welcome back</h2>
                <p class="subtitle">Sign in to access your account.</p>

                <div id="errorMessage" class="error-toast"></div>

                <form id="loginForm">
                    <div class="field-group">
                        <div class="input-unit">
                            <i class="fa-solid fa-envelope"></i> <label for="loginEmail" class="field-label">Email
                                Address</label>
                            <div class="input-wrap">
                                <input type="email" id="loginEmail" placeholder="example@mail.com" required>
                            </div>
                        </div>

                        <div class="input-unit">
                            <i class="fa-solid fa-lock"></i><label for="loginPassword"
                                class="field-label">Password</label>
                            <div class="input-wrap">
                                <input type="password" id="loginPassword" placeholder="••••••••" required>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Sign In</button>

                    <p class="redirect-text">
                        Don't have an account? <a href="register.html">Register</a>
                    </p>
                </form>
                <div class="back-link">
                    <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="JS/auth.js"></script>
</body>

</html>
