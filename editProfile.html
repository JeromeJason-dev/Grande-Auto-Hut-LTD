<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Grande Auto Hut Ltd</title>
    <script src="https://kit.fontawesome.com/576b15dc95.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="CSS/checkout.css">
    <link rel="stylesheet" href="CSS/profile.css">
</head>

<body>

    <header class="top-navbar">
        <h1 class="nav-brand">GRANDE AUTO HUT LTD</h1>
    </header>

    <div class="dashboard-core-wrapper">

        <input type="checkbox" id="home-menu-toggle">

        <aside class="sidebar">
            <div class="sidebar-header-wrapper">
                <label for="home-menu-toggle" class="hamburger-label">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-links">
                    <li><a href="profile.html"><i class="fa-solid fa-user-circle"></i> My Account</a></li>
                    <li><a href="product.html"><i class="fa-brands fa-product-hunt"></i> Product</a></li>
                    <li><a href="contact.html"><i class="fa-solid fa-address-book"></i> Contact</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button class="cart-icon" onclick="location.href='cart.html'">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span>View Cart</span>
                    <span id="nav-cart-count" class="cart-badge">0</span>
                </button>
            </div>
        </aside>

        <div class="main-layout-content">

            <div class="profile-page-header">
                <h2><i class="fa-solid fa-user-gear"></i> Edit Profile</h2>
                <p>Update your account details below.</p>
            </div>

            <div class="checkout-card" style="max-width: 600px;">
                <div class="form-grid">
                    <div class="field">
                        <label>First Name</label>
                        <input type="text" id="edit-first-name" placeholder="John" autocomplete="given-name">
                    </div>
                    <div class="field">
                        <label>Last Name</label>
                        <input type="text" id="edit-last-name" placeholder="Doe" autocomplete="family-name">
                    </div>
                    <div class="field full">
                        <label>Email Address</label>
                        <input type="email" id="edit-email" placeholder="john@example.com" autocomplete="email">
                        <small id="email-locked-note" style="display:none; color:#856404;">Email is used to sign in and can't be changed here.</small>
                    </div>
                    <div class="field full">
                        <label>Phone Number</label>
                        <input type="tel" id="edit-phone" placeholder="07XXXXXXXX" autocomplete="tel">
                    </div>
                    <div class="field full">
                        <label>New Password <small style="color:#6c757d;">(leave blank to keep current password)</small></label>
                        <input type="password" id="edit-password" placeholder="••••••••" autocomplete="new-password">
                    </div>
                    <div class="field full">
                        <label>Confirm New Password</label>
                        <input type="password" id="edit-confirm-password" placeholder="••••••••" autocomplete="new-password">
                    </div>
                </div>

                <p id="edit-error" style="display:none; color:#e53e3e; font-size:0.88rem; margin-top: 10px;"></p>
                <p id="edit-success" style="display:none; color:#155724; font-size:0.88rem; margin-top: 10px;"></p>

                <button class="place-order-btn" id="saveProfileBtn" type="button" style="margin-top: 18px;">
                    <i class="fa-solid fa-floppy-disk"></i> Save Changes
                </button>
            </div>

        </div>
    </div>

    <script src="JS/auth.js"></script>
    <script src="JS/edit-profile.js"></script>
</body>

</html>
