<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRANDE AUTO HUT LTD</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/576b15dc95.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>
    <header>
        <nav class="navbar">
            <h1 class="text-3xl">GRANDE AUTO HUT LTD</h1>
            <ul class="nav-links">
                <li><a href="home"><i class="fa-solid fa-house"></i>Home</a></li>
                <li><a href="#product"><i class="fa-brands fa-product-hunt"></i>Product</a></li>
                <li><a href="about"><i class="fa-solid fa-circle-info"></i>About</a></li>
                <li><a href="contact"><i class="fa-solid fa-address-book"></i>Contact</a></li>
            </ul>
            <button class="cart-btn">
                <i class="fa-solid fa-cart-shopping"></i>
            </button>
        </nav>

    </header>
    <!-- FILTER -->
    <section class="flex gap-9 text-xl">
        <select class="border ">
            <option>Sort by Price</option>
            <option>Low to High</option>
            <option>High to Low</option>
        </select>

        <select class="border">
            <option>Filter</option>
            <option>Radiator</option>
            <option>Battery</option>
            <option>Coolant</option>
            <option>Headlights</option>
            <option>Shock Absorber</option>
            <option>Brake Pad</option>
        </select>
    </section>
    <!-- GRID -->
    <main class="product-grid">
        <!-- CARD -->
        <article class="product-card">
            <img src="assets/images/oil-filter.jpg" alt="oil filter">
            <div class="product-info">
                <h3>Oil Filter</h3>
                <div class="rating">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-regular fa-star"></i>
                </div>
                <p class="price">Ksh 2,000</p>
            </div>
        </article>
        <article class="product-card">
            <img src="assets/images/shock-absorber.jpg" alt="shock absorber">
            <div class="product-info">
                <h3>Shock Absorber</h3>
                <div class="rating">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                </div>
                <p class="price">Ksh 10,000</p>
            </div>
        </article>
        <article class="product-card">
            <img src="assets/images/radiator.jpg" alt="radiator">
            <div class="product-info">
                <h3>Radiator</h3>
                <div class="rating">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-regular fa-star"></i>
                </div>
                <p class="price">Ksh 800</p>
            </div>
        </article>
        <article class="product-card">
            <img src="assets/images/headlights.jpg" alt="haedlights">
            <div class="product-info">
                <h3>Headlights</h3>
                <div class="rating">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                </div>
                <p class="price">Ksh 12,000</p>
            </div>
        </article>
        <article class="product-card">
            <img src="assets/images/coolant.jpg" alt="coolant">
            <div class="product-info">
                <h3>Coolant</h3>
                <div class="rating">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-regular fa-star"></i>
                </div>
                <p class="price">Ksh 1,500</p>
            </div>
        </article>
        <article class="product-card">
            <img src="assets/images/battery.jpg" alt="battery">
            <div class="product-info">
                <h3>Battery</h3>
                <div class="rating">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                </div>
                <p class="price">Ksh 20,000</p>
            </div>
        </article>
        <article class="product-card">
            <img src="assets/images/brake-pads.jpg" alt="brake pads">
            <div class="product-info">
                <h3>Brake Pads</h3>
                <div class="rating">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-regular fa-star"></i>
                </div>
                <p class="price">Ksh 2,000</p>
            </div>
        </article>
    </main>
    <!-- FOOTER -->
     
</body>

</html>
